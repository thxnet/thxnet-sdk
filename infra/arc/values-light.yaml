# ARC Runner Scale Set: light jobs (fmt, Docker image builds, check-links)
# Label: hetzner-thxnet-light (same as existing runner — zero workflow changes)
# Custom DinD template — same pattern as values-heavy.yaml but fewer resources.

githubConfigUrl: "https://github.com/thxnet"
githubConfigSecret: github-app-secret

runnerScaleSetName: "hetzner-thxnet-light"
maxRunners: 2
minRunners: 0

template:
  spec:
    initContainers:
      - name: init-dind-externals
        image: ghcr.io/actions/actions-runner:latest
        command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
      - name: dind
        image: docker:dind
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --group=$(DOCKER_GROUP_GID)
        env:
          - name: DOCKER_GROUP_GID
            value: "123"
        securityContext:
          privileged: true
        restartPolicy: Always
        startupProbe:
          exec:
            command: ["docker", "info"]
          initialDelaySeconds: 0
          failureThreshold: 24
          periodSeconds: 5
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
          # Light jobs need cargo caches for fmt/taplo/zepter container jobs
          - name: cargo-registry
            mountPath: /home/runner/.cache/cargo-registry
          - name: cargo-git
            mountPath: /home/runner/.cache/cargo-git
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: "120"
          - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
            value: "false"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: cargo-registry
            mountPath: /home/runner/.cache/cargo-registry
          - name: cargo-git
            mountPath: /home/runner/.cache/cargo-git
    volumes:
      - name: work
        emptyDir: {}
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      - name: cargo-registry
        hostPath:
          path: /host-cache/cargo-registry
          type: DirectoryOrCreate
      - name: cargo-git
        hostPath:
          path: /host-cache/cargo-git
          type: DirectoryOrCreate
