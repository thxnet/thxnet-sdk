name: Upgrade

on:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
    branches:
      - "upgrade/*"
      - "experiment/*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version being upgraded to (e.g. 1.3.0)"
        required: true

concurrency:
  group: upgrade-${{ github.ref || github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build-extras:
    name: Build try-runtime & fast-runtime
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.70.0-2023-05-23-v20230706
      volumes:
        - /data/ci-cache:/cache
    env:
      CARGO_TARGET_DIR: /cache/cargo-target/upgrade
      CARGO_HOME: /cache/cargo-home
      WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Build try-runtime WASMs
        run: |
          cargo build --release -p thxnet-testnet-runtime --features try-runtime
          cargo build --release -p general-runtime --features try-runtime
          mkdir -p /tmp/try-runtime-wasm
          cp /cache/cargo-target/upgrade/release/wbuild/thxnet-testnet-runtime/thxnet_testnet_runtime.compact.compressed.wasm \
            /tmp/try-runtime-wasm/thxnet-testnet-runtime-try-runtime.wasm
          cp /cache/cargo-target/upgrade/release/wbuild/general-runtime/general_runtime.compact.compressed.wasm \
            /tmp/try-runtime-wasm/general-runtime-try-runtime.wasm

      - name: Build fast-runtime binary
        run: |
          cargo build --release -p polkadot --features fast-runtime
          mkdir -p /tmp/fast-runtime-bins
          cp /cache/cargo-target/upgrade/release/polkadot /tmp/fast-runtime-bins/polkadot-fast-runtime
          cp /cache/cargo-target/upgrade/release/polkadot-prepare-worker /tmp/fast-runtime-bins/
          cp /cache/cargo-target/upgrade/release/polkadot-execute-worker /tmp/fast-runtime-bins/

      - name: Upload try-runtime WASMs
        uses: actions/upload-artifact@v4
        with:
          name: try-runtime-wasm
          retention-days: 3
          path: /tmp/try-runtime-wasm/

      - name: Upload fast-runtime binaries
        uses: actions/upload-artifact@v4
        with:
          name: fast-runtime-bins
          retention-days: 3
          path: /tmp/fast-runtime-bins/

      - name: Clean build cache
        if: always()
        run: rm -rf /cache/cargo-target/upgrade

      - name: Fix workspace permissions
        if: always()
        run: chown -R 1000:1001 $GITHUB_WORKSPACE

  download-docker-artifacts:
    name: Download Docker workflow artifacts
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Download artifacts from Docker workflow
        uses: actions/github-script@v7
        with:
          script: |
            let targetRunId;

            if (context.payload.workflow_run) {
              targetRunId = context.payload.workflow_run.id;
            } else {
              // workflow_dispatch — find latest successful Docker run
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'docker.yml',
                branch: context.ref.replace('refs/heads/', ''),
                status: 'success',
                per_page: 1,
              });
              if (runs.data.workflow_runs.length === 0) {
                core.setFailed('No successful Docker workflow run found');
                return;
              }
              targetRunId = runs.data.workflow_runs[0].id;
            }

            core.info(`Downloading artifacts from Docker run ${targetRunId}`);

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: targetRunId,
            });

            const fs = require('fs');
            for (const artifact of artifacts.data.artifacts) {
              core.info(`Downloading ${artifact.name}...`);
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                archive_format: 'zip',
              });
              const dir = `/tmp/docker-artifacts`;
              fs.mkdirSync(dir, { recursive: true });
              fs.writeFileSync(`${dir}/${artifact.name}.zip`, Buffer.from(download.data));
            }

      - name: Extract artifacts
        run: |
          cd /tmp/docker-artifacts
          for f in *.zip; do
            dir="${f%.zip}"
            mkdir -p "$dir"
            unzip -o "$f" -d "$dir/"
          done
          ls -lhR /tmp/docker-artifacts/

      - name: Re-upload leafchain binary
        uses: actions/upload-artifact@v4
        with:
          name: leafchain-bin
          retention-days: 3
          path: /tmp/docker-artifacts/binaries/thxnet-leafchain

  try-runtime:
    name: try-runtime migration tests
    needs: build-extras
    runs-on: self-hosted
    steps:
      - name: Download try-runtime WASMs
        uses: actions/download-artifact@v4
        with:
          name: try-runtime-wasm
          path: /tmp/try-runtime-wasm

      - name: try-runtime — rootchain
        run: |
          pkill -f "port-forward.*9944" 2>/dev/null || true
          kubectl port-forward -n forked-testnet svc/archive-node 9944:9944 &
          sleep 5

          ~/.cargo/bin/try-runtime \
            --runtime /tmp/try-runtime-wasm/thxnet-testnet-runtime-try-runtime.wasm \
            on-runtime-upgrade \
            live --uri ws://localhost:9944

      - name: try-runtime — leafchain
        run: |
          pkill -f "port-forward.*9945" 2>/dev/null || true
          COLLATOR_POD=$(kubectl get pods -n forked-testnet -l app=collator-albania -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n forked-testnet pod/$COLLATOR_POD 9945:60002 &
          sleep 5

          ~/.cargo/bin/try-runtime \
            --runtime /tmp/try-runtime-wasm/general-runtime-try-runtime.wasm \
            on-runtime-upgrade \
            live --uri ws://localhost:9945

      - name: Cleanup port-forwards
        if: always()
        run: |
          pkill -f "port-forward.*9944" 2>/dev/null || true
          pkill -f "port-forward.*9945" 2>/dev/null || true

  zombienet:
    name: Zombienet smoke test
    needs: [build-extras, download-docker-artifacts]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Download fast-runtime binaries
        uses: actions/download-artifact@v4
        with:
          name: fast-runtime-bins
          path: /tmp/upgrade-bins

      - name: Download leafchain binary
        uses: actions/download-artifact@v4
        with:
          name: leafchain-bin
          path: /tmp/upgrade-bins

      - name: Run zombienet smoke test
        run: |
          chmod +x /tmp/upgrade-bins/*

          export RELAY_BIN=/tmp/upgrade-bins/polkadot-fast-runtime
          export COLLATOR_BIN=/tmp/upgrade-bins/thxnet-leafchain

          /home/raj/.local/bin/zombienet -p native -f test scripts/zombienet-smoke.zndsl
        timeout-minutes: 15

  xcm-tests:
    name: XCM integration tests
    needs: build-extras
    runs-on: self-hosted
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.70.0-2023-05-23-v20230706
      volumes:
        - /data/ci-cache:/cache
    env:
      CARGO_TARGET_DIR: /cache/cargo-target/xcm
      CARGO_HOME: /cache/cargo-home
      WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Run XCM integration tests
        run: cargo test -p xcm-integration-tests --release

      - name: Clean build cache
        if: always()
        run: rm -rf /cache/cargo-target/xcm

      - name: Fix workspace permissions
        if: always()
        run: chown -R 1000:1001 $GITHUB_WORKSPACE
