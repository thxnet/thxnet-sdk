name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the release (e.g. 1.3.0)"
        required: true

env:
  SUBWASM_VERSION: 0.21.3
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: "*"
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_DIR: /home/runner/.cache/sccache
  SCCACHE_CACHE_SIZE: 300G

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  build-runtimes:
    name: Build runtime WASMs
    runs-on: [self-hosted, hetzner-thxnet]
    timeout-minutes: 90
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
        - /home/runner/.cache/sccache-bin/sccache:/usr/local/bin/sccache
        - /home/runner/.cache/sccache:/home/runner/.cache/sccache
    env:
      WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v5

      - name: Build all runtime WASMs
        run: cargo build --locked --release -p polkadot -p thxnet-testnet-runtime -p thxnet-leafchain

      - name: sccache stats
        if: always()
        run: sccache --show-stats

      - name: Install subwasm
        run: |
          curl -L "https://github.com/chevdor/subwasm/releases/download/v${SUBWASM_VERSION}/subwasm_linux_amd64_v${SUBWASM_VERSION}.deb" \
            -o /tmp/subwasm.deb
          dpkg -i /tmp/subwasm.deb || apt-get install -f -y
          subwasm --version

      - name: Prepare release artifacts
        id: prepare
        run: |
          mkdir -p release-artifacts

          for rt in \
            "thxnet:target/release/wbuild/thxnet-runtime/thxnet_runtime.compact.compressed.wasm" \
            "thxnet-testnet:target/release/wbuild/thxnet-testnet-runtime/thxnet_testnet_runtime.compact.compressed.wasm" \
            "thxnet-general:target/release/wbuild/general-runtime/general_runtime.compact.compressed.wasm"
          do
            NAME="${rt%%:*}"
            WASM="${rt#*:}"

            echo "=== ${NAME} ==="
            "$HOME/.local/bin/subwasm" info "${WASM}"
            "$HOME/.local/bin/subwasm" --json info "${WASM}" > "release-artifacts/${NAME}-info.json"
            "$HOME/.local/bin/subwasm" --json meta "${WASM}" > "release-artifacts/${NAME}-metadata.json"
            cp "${WASM}" "release-artifacts/${NAME}-runtime.compact.compressed.wasm"
          done

          ls -la release-artifacts/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-runtimes
          retention-days: 7
          path: release-artifacts/

  publish:
    name: Publish release
    needs: build-runtimes
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted, hetzner-thxnet]
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-runtimes
          path: runtimes/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            runtimes/*.wasm
            runtimes/*-info.json
            runtimes/*-metadata.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
