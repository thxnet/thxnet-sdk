name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the release (e.g. 1.3.0)"
        required: true

defaults:
  run:
    shell: bash

jobs:
  wasm:
    name: Build WASM runtimes
    runs-on: self-hosted
    container:
      image: docker.io/paritytech/ci-linux:production
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM runtimes
        run: |
          cargo build --release \
            --package thxnet-runtime \
            --package thxnet-testnet-runtime \
            --package general-runtime
          cp target/release/wbuild/thxnet-runtime/thxnet_runtime.compact.compressed.wasm thxnet-runtime.wasm
          cp target/release/wbuild/thxnet-testnet-runtime/thxnet_testnet_runtime.compact.compressed.wasm thxnet-testnet-runtime.wasm
          cp target/release/wbuild/general-runtime/general_runtime.compact.compressed.wasm general-runtime.wasm

      - name: Publish WASM runtimes
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: |
            thxnet-runtime.wasm
            thxnet-testnet-runtime.wasm
            general-runtime.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload WASM artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-runtimes
          path: |
            thxnet-runtime.wasm
            thxnet-testnet-runtime.wasm
            general-runtime.wasm
