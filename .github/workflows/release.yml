name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the release (e.g. 1.3.0)"
        required: true

defaults:
  run:
    shell: bash

jobs:
  wasm:
    name: Build WASM runtimes
    runs-on: self-hosted
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /data/ci-cache:/cache
    env:
      CARGO_TARGET_DIR: /cache/cargo-target/release
      CARGO_HOME: /cache/cargo-home
      WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v5

      - name: Build WASM runtimes
        run: |
          cargo build --release \
            --package thxnet-runtime \
            --package thxnet-testnet-runtime \
            --package general-runtime
          cp /cache/cargo-target/release/release/wbuild/thxnet-runtime/thxnet_runtime.compact.compressed.wasm thxnet-runtime.wasm
          cp /cache/cargo-target/release/release/wbuild/thxnet-testnet-runtime/thxnet_testnet_runtime.compact.compressed.wasm thxnet-testnet-runtime.wasm
          cp /cache/cargo-target/release/release/wbuild/general-runtime/general_runtime.compact.compressed.wasm general-runtime.wasm

      - name: Clean build cache
        if: always()
        run: rm -rf /cache/cargo-target/release

      - name: Publish WASM runtimes
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            thxnet-runtime.wasm
            thxnet-testnet-runtime.wasm
            general-runtime.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload WASM artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        with:
          name: wasm-runtimes
          path: |
            thxnet-runtime.wasm
            thxnet-testnet-runtime.wasm
            general-runtime.wasm
