name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the release (e.g. 1.3.0)"
        required: true

env:
  SUBWASM_VERSION: 0.21.3

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  srtool:
    name: Build runtime (${{ matrix.chain }})
    runs-on: [self-hosted, hetzner-thxnet]
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - chain: thxnet
            package: thxnet-runtime
            runtime_dir: thxnet/runtime/thxnet
          - chain: thxnet-testnet
            package: thxnet-testnet-runtime
            runtime_dir: thxnet/runtime/thxnet-testnet
          - chain: thxnet-general
            package: general-runtime
            runtime_dir: thxnet/leafchain/runtime/general
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Pre-flight — verify jq is available
        run: |
          if ! command -v jq &>/dev/null; then
            echo "::error::jq is not installed on this runner"
            exit 1
          fi
          jq --version

      - name: Fix workspace permissions for srtool
        run: |
          # srtool Docker container runs as UID 1000 (builder), but host
          # runner is UID 1001. Stale target dirs from previous Docker runs
          # are owned by UID 1000 and cannot be removed without sudo.
          sudo rm -rf "${{ github.workspace }}/${{ matrix.runtime_dir }}/target"
          # Ensure the container user can read, write, and traverse the workspace.
          # a+rwX = read+write for all, execute on directories only (capital X).
          sudo chmod -R a+rwX "${{ github.workspace }}"

      - name: Build runtime with srtool
        id: srtool_build
        uses: chevdor/srtool-actions@v0.9.2
        with:
          chain: ${{ matrix.chain }}
          package: ${{ matrix.package }}
          runtime_dir: ${{ matrix.runtime_dir }}

      - name: Summary
        run: |
          echo '${{ steps.srtool_build.outputs.json }}' | jq . > ${{ matrix.chain }}-srtool-digest.json
          cat ${{ matrix.chain }}-srtool-digest.json
          echo "Compact Runtime: ${{ steps.srtool_build.outputs.wasm }}"
          echo "Compressed Runtime: ${{ steps.srtool_build.outputs.wasm_compressed }}"
          cp ${{ steps.srtool_build.outputs.wasm }} ${{ matrix.chain }}-runtime.wasm
          cp ${{ steps.srtool_build.outputs.wasm_compressed }} ${{ matrix.chain }}-runtime.compact.compressed.wasm

      - name: Install subwasm
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -L "https://github.com/chevdor/subwasm/releases/download/v${SUBWASM_VERSION}/subwasm_linux_amd64_v${SUBWASM_VERSION}.gz" \
            | gunzip > "$HOME/.local/bin/subwasm"
          chmod +x "$HOME/.local/bin/subwasm"
          "$HOME/.local/bin/subwasm" --version

      - name: Show runtime information
        run: |
          subwasm info ${{ steps.srtool_build.outputs.wasm }}
          subwasm info ${{ steps.srtool_build.outputs.wasm_compressed }}
          subwasm info ${{ steps.srtool_build.outputs.wasm }} --json > ${{ matrix.chain }}-info.json
          subwasm info ${{ steps.srtool_build.outputs.wasm_compressed }} --json > ${{ matrix.chain }}-compressed-info.json

      - name: Extract the metadata
        run: |
          subwasm meta ${{ steps.srtool_build.outputs.wasm }}
          subwasm meta ${{ steps.srtool_build.outputs.wasm }} --json > ${{ matrix.chain }}-metadata.json

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.chain }}-runtime
          path: |
            ${{ matrix.chain }}-runtime.wasm
            ${{ matrix.chain }}-runtime.compact.compressed.wasm
            ${{ matrix.chain }}-srtool-digest.json
            ${{ matrix.chain }}-info.json
            ${{ matrix.chain }}-compressed-info.json
            ${{ matrix.chain }}-metadata.json

  publish:
    name: Publish release
    needs: srtool
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted, hetzner-thxnet]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Download all runtime artifacts
        uses: actions/download-artifact@v5
        with:
          path: runtimes/

      - name: Publish WASM runtimes
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            runtimes/**/*.wasm
            runtimes/**/*-srtool-digest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
