name: Release

on:
  push:
    tags:
      - "thxnet-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the release (e.g. 1.3.0)"
        required: true

env:
  SUBWASM_VERSION: 0.21.3
  REGISTRY: ghcr.io
  ROOTCHAIN_IMAGE: ${{ github.repository_owner }}/rootchain
  LEAFCHAIN_IMAGE: ${{ github.repository_owner }}/leafchain
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: "*"
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_DIR: /home/runner/.cache/sccache/${{ github.head_ref || github.ref_name }}
  SCCACHE_CACHE_SIZE: 300G

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  # File ownership cleanup is handled by the runner-level job-started hook
  # (ACTIONS_RUNNER_HOOK_JOB_STARTED) — no per-workflow pre-cleanup needed.

  build-runtimes:
    name: Build runtime WASMs
    runs-on: hetzner-thxnet
    timeout-minutes: 90
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
        - /home/runner/.cache/sccache-bin/sccache:/usr/local/bin/sccache
        - /home/runner/.cache/sccache:/home/runner/.cache/sccache
    env:
      WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v5

      - name: Build all runtime WASMs
        run: cargo build --locked --release -p polkadot -p thxnet-testnet-runtime -p thxnet-leafchain

      - name: sccache stats
        if: always()
        run: sccache --show-stats

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts

          for rt in \
            "thxnet:target/release/wbuild/thxnet-runtime/thxnet_runtime.compact.compressed.wasm" \
            "thxnet-testnet:target/release/wbuild/thxnet-testnet-runtime/thxnet_testnet_runtime.compact.compressed.wasm" \
            "thxnet-general:target/release/wbuild/general-runtime/general_runtime.compact.compressed.wasm"
          do
            NAME="${rt%%:*}"
            WASM="${rt#*:}"
            echo "=== ${NAME} ==="
            ls -la "${WASM}"
            sha256sum "${WASM}" | tee "release-artifacts/${NAME}-runtime.sha256"
            cp "${WASM}" "release-artifacts/${NAME}-runtime.compact.compressed.wasm"
          done

          ls -la release-artifacts/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-runtimes
          retention-days: 7
          path: release-artifacts/

      - name: Upload node binaries
        uses: actions/upload-artifact@v5
        with:
          name: release-binaries
          retention-days: 7
          path: |
            target/release/polkadot
            target/release/polkadot-prepare-worker
            target/release/polkadot-execute-worker
            target/release/thxnet-leafchain

  # ─── Docker images ───────────────────────────────────────────────────

  rootchain-image:
    name: Build rootchain image
    needs: build-runtimes
    runs-on: hetzner-thxnet-light
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Download binaries
        uses: actions/download-artifact@v5
        with:
          name: release-binaries
          path: target/release

      - name: Make binaries executable
        run: chmod +x target/release/polkadot target/release/polkadot-prepare-worker target/release/polkadot-execute-worker

      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ROOTCHAIN_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=

      - name: Build & push rootchain image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: thxnet/docker/polkadot/polkadot_injected.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ROOTCHAIN_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ROOTCHAIN_IMAGE }}:buildcache,mode=max

  leafchain-image:
    name: Build leafchain image
    needs: build-runtimes
    runs-on: hetzner-thxnet-light
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Download binaries
        uses: actions/download-artifact@v5
        with:
          name: release-binaries
          path: target/release

      - name: Make binaries executable
        run: chmod +x target/release/thxnet-leafchain

      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.LEAFCHAIN_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=

      - name: Build & push leafchain image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: thxnet/docker/leafchain/leafchain_injected.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.LEAFCHAIN_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.LEAFCHAIN_IMAGE }}:buildcache,mode=max

  publish:
    name: Publish release
    needs: build-runtimes
    runs-on: hetzner-thxnet
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-runtimes
          path: runtimes/

      - name: Install subwasm
        run: |
          # subwasm .deb needs libssl3 + glibc >= 2.34 — host runner
          # (Ubuntu 24.04) has these, but the bullseye build container doesn't.
          wget -q "https://github.com/chevdor/subwasm/releases/download/v${SUBWASM_VERSION}/subwasm_linux_amd64_v${SUBWASM_VERSION}.deb"
          sudo dpkg -i "subwasm_linux_amd64_v${SUBWASM_VERSION}.deb"
          subwasm --version

      - name: Generate runtime metadata
        run: |
          for wasm in runtimes/*.wasm; do
            NAME=$(basename "$wasm" -runtime.compact.compressed.wasm)
            echo "=== ${NAME} ==="
            subwasm info "$wasm"
            subwasm --json info "$wasm" > "runtimes/${NAME}-info.json"
            subwasm --json meta "$wasm" > "runtimes/${NAME}-metadata.json"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.version) }}
          draft: false
          prerelease: false
          files: |
            runtimes/*.wasm
            runtimes/*.sha256
            runtimes/*-info.json
            runtimes/*-metadata.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
