name: Tests

on:
  push:
    branches:
      - main
      - master
      - main-thxnet
  pull_request:
  merge_group:

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: "*"
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_DIR: /home/runner/.cache/sccache
  SCCACHE_CACHE_SIZE: 300G

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  nextest:
    name: Cargo nextest
    runs-on: hetzner-thxnet
    timeout-minutes: 120
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
        - /home/runner/.cache/sccache-bin/sccache:/usr/local/bin/sccache
        - /home/runner/.cache/sccache:/home/runner/.cache/sccache
    env:
      RUSTFLAGS: "-C debug-assertions"
      WASM_BUILD_RUSTFLAGS: "-C debug-assertions"
      WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
      RUST_BACKTRACE: full
    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: |
          cargo nextest run --locked --release \
            --package thxnet-runtime \
            --package thxnet-testnet-runtime \
            --package general-runtime \
            --package thxnet-leafchain

      - name: sccache stats
        if: always()
        run: sccache --show-stats 2>/dev/null || true

  bench-check:
    name: Benchmark compilation check
    runs-on: hetzner-thxnet
    timeout-minutes: 60
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
        - /home/runner/.cache/sccache-bin/sccache:/usr/local/bin/sccache
        - /home/runner/.cache/sccache:/home/runner/.cache/sccache
    env:
      SKIP_WASM_BUILD: 1
      WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v5

      - name: Check benchmarks compile
        run: |
          cargo check --locked --benches \
            --package thxnet-runtime \
            --package thxnet-testnet-runtime \
            --package general-runtime

      - name: sccache stats
        if: always()
        run: sccache --show-stats 2>/dev/null || true

  # Syscalls validation for worker binaries.
  # Catches unexpected syscall additions that could be security risks.
  # cf. https://github.com/paritytech/polkadot-sdk/issues/1652
  #
  # NOTE: The baseline files (execute-worker-syscalls, prepare-worker-syscalls)
  # are currently copied from polkadot-sdk upstream. They should be regenerated
  # from thxnet-sdk's own binaries on a Linux build to capture any divergence.
  # To regenerate:
  #   cargo build --locked --profile production --target x86_64-unknown-linux-musl \
  #     --bin polkadot-execute-worker --bin polkadot-prepare-worker
  #   ./polkadot/scripts/list-syscalls/list-syscalls.rb \
  #     target/x86_64-unknown-linux-musl/production/polkadot-execute-worker --only-used-syscalls \
  #     > polkadot/scripts/list-syscalls/execute-worker-syscalls
  #   ./polkadot/scripts/list-syscalls/list-syscalls.rb \
  #     target/x86_64-unknown-linux-musl/production/polkadot-prepare-worker --only-used-syscalls \
  #     > polkadot/scripts/list-syscalls/prepare-worker-syscalls
  test-syscalls:
    name: Syscalls validation
    runs-on: hetzner-thxnet
    timeout-minutes: 60
    continue-on-error: true
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
        - /home/runner/.cache/sccache-bin/sccache:/usr/local/bin/sccache
        - /home/runner/.cache/sccache:/home/runner/.cache/sccache
    env:
      SKIP_WASM_BUILD: 1
      WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v5

      - name: Ensure musl target and ruby are available
        run: |
          rustup target add x86_64-unknown-linux-musl 2>/dev/null || true
          ruby --version || (apt-get update -qq && apt-get install -y -qq ruby > /dev/null 2>&1)
          objdump --version | head -1

      - name: Build worker binaries (musl, production)
        run: |
          cargo build --locked --profile production \
            --target x86_64-unknown-linux-musl \
            --bin polkadot-execute-worker \
            --bin polkadot-prepare-worker

      - name: Validate execute-worker syscalls
        run: |
          cd polkadot/scripts/list-syscalls
          ./list-syscalls.rb \
            ../../../target/x86_64-unknown-linux-musl/production/polkadot-execute-worker \
            --only-used-syscalls | diff -u execute-worker-syscalls -

      - name: Validate prepare-worker syscalls
        run: |
          cd polkadot/scripts/list-syscalls
          ./list-syscalls.rb \
            ../../../target/x86_64-unknown-linux-musl/production/polkadot-prepare-worker \
            --only-used-syscalls | diff -u prepare-worker-syscalls -

      - name: sccache stats
        if: always()
        run: sccache --show-stats 2>/dev/null || true
