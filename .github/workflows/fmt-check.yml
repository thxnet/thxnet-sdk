name: Quick checks

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Rustfmt
    runs-on: [self-hosted, hetzner-thxnet]
    timeout-minutes: 10
    container:
      image: paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
    steps:
      - uses: actions/checkout@v5

      - name: Cargo fmt
        run: cargo +nightly fmt --all -- --check

  taplo:
    name: TOML format
    runs-on: [self-hosted, hetzner-thxnet]
    timeout-minutes: 10
    container:
      image: paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
    steps:
      - uses: actions/checkout@v5

      - name: Check TOML formatting
        run: taplo format --check --config .config/taplo.toml

  zepter:
    name: Feature propagation
    runs-on: [self-hosted, hetzner-thxnet]
    timeout-minutes: 10
    container:
      image: paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
    steps:
      - uses: actions/checkout@v5

      - name: Check feature propagation
        run: zepter run check
