name: Quick checks

on:
  push:
    branches:
      - main
      - master
      - main-thxnet
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Rustfmt
    runs-on: hetzner-thxnet-light
    timeout-minutes: 10
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.88.0-2025-06-27-v202511141243
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
    steps:
      - uses: actions/checkout@v5

      - name: Cargo fmt
        run: cargo +nightly fmt --all -- --check

  taplo:
    name: TOML format
    runs-on: hetzner-thxnet-light
    timeout-minutes: 10
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.88.0-2025-06-27-v202511141243
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
    steps:
      - uses: actions/checkout@v5

      - name: Check TOML formatting
        run: taplo format --check --config .config/taplo.toml

  zepter:
    name: Feature propagation
    runs-on: hetzner-thxnet
    timeout-minutes: 10
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.88.0-2025-06-27-v202511141243
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
    steps:
      - uses: actions/checkout@v5

      # Install latest zepter — the container's bundled zepter 1.78.2 is older
      # than the required 1.82.1 and doesn't support the `duplicate-deps` lint.
      - name: Install zepter
        run: cargo install zepter --version 1.82.1 --locked --quiet

      - name: Check feature propagation
        run: zepter run check
