name: Rust

on:
  push:
    branches:
      - main
      - base/*
      - experiment/*
      - upgrade/*
      - feature/*
      - ci/*
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Cargo check (thxnet crates)
    runs-on: self-hosted
    container:
      image: docker.io/paritytech/ci-linux:production
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo check — rootchain runtimes
        run: |
          cargo check \
            --package thxnet-runtime \
            --package thxnet-testnet-runtime

      - name: Cargo check — leafchain
        run: |
          cargo check \
            --package general-runtime \
            --package thxnet-leafchain
