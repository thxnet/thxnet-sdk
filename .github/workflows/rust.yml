name: Rust

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

env:
  CARGO_TERM_COLOR: always
  WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_BUCKET: sccache
  SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_ENDPOINT }}
  SCCACHE_S3_USE_SSL: "true"
  SCCACHE_REGION: auto
  AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_ACCESS_KEY }}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Cargo check (thxnet crates)
    runs-on: [self-hosted, hetzner-thxnet]
    timeout-minutes: 60
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.77.0-2024-04-10-v20240408
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
        - /home/runner/.cache/sccache-bin/sccache:/usr/local/bin/sccache
    steps:
      - uses: actions/checkout@v5

      - name: Cargo check — all thxnet crates
        run: |
          cargo check --locked \
            --package thxnet-runtime \
            --package thxnet-testnet-runtime \
            --package general-runtime \
            --package thxnet-leafchain

      - name: sccache stats
        if: always()
        run: sccache --show-stats 2>/dev/null || true
