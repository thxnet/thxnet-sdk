name: Rust

on:
  push:
    branches:
      - main
      - master
      - main-thxnet
  pull_request:
  merge_group:

env:
  CARGO_TERM_COLOR: always
  WASM_BUILD_WORKSPACE_HINT: ${{ github.workspace }}
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: "*"
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  # Branch-isolated sccache to prevent stale artifacts leaking between branches.
  SCCACHE_DIR: /home/runner/.cache/sccache/${{ github.head_ref || github.ref_name }}
  SCCACHE_CACHE_SIZE: 300G

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Cargo check (thxnet crates)
    runs-on: [self-hosted, hetzner-thxnet]
    timeout-minutes: 60
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.88.0-2025-06-27-v202511141243
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
        - /home/runner/.cache/sccache-bin/sccache:/usr/local/bin/sccache
        - /home/runner/.cache/sccache:/home/runner/.cache/sccache
    steps:
      - uses: actions/checkout@v5

      - name: Sanitize cargo registry source cache
        # See ci.yml for rationale: registry/src/ can get partially corrupted
        # (missing .rs files inside extracted dirs) which sccache trips over.
        # Wiping it forces cargo to re-extract from the immutable .crate
        # tarballs in registry/cache/ on demand.
        run: |
          set -euo pipefail
          if [ -d /usr/local/cargo/registry/src ]; then
            echo "Wiping registry/src/ to force re-extraction from cached tarballs"
            rm -rf /usr/local/cargo/registry/src
          fi
          mkdir -p /usr/local/cargo/registry/src

      - name: Cargo check — all thxnet crates
        run: |
          cargo check --locked \
            --package thxnet-runtime \
            --package thxnet-testnet-runtime \
            --package general-runtime \
            --package thxnet-leafchain

      - name: sccache stats
        if: always()
        run: sccache --show-stats 2>/dev/null || true
