name: Rust

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: /cache/cargo-target/check
  CARGO_HOME: /cache/cargo-home

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Cargo check (thxnet crates)
    runs-on: self-hosted
    container:
      image: docker.io/paritytech/ci-linux:production
      volumes:
        - /data/ci-cache:/cache
    steps:
      - uses: actions/checkout@v4

      - name: Cargo check — rootchain runtimes
        run: |
          cargo check \
            --package thxnet-runtime \
            --package thxnet-testnet-runtime

      - name: Cargo check — leafchain
        run: |
          cargo check \
            --package general-runtime \
            --package thxnet-leafchain

      - name: Clean build cache
        if: always()
        run: rm -rf /cache/cargo-target/check
