name: Rust

on:
  push:
    branches:
      - main
      - base/*
      - experiment/*
      - feature/*
      - ci/*
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Cargo check (thxnet crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Pre Cache
        run: |
          rm -rf ~/.cargo/registry/index/ ~/.cargo/registry/cache/ ~/.cargo/git/db/

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo check — rootchain runtimes
        run: |
          nix develop --command bash -c "cargo check \
            --package thxnet-runtime \
            --package thxnet-testnet-runtime"

      - name: Cargo check — leafchain
        run: |
          nix develop --command bash -c "cargo check \
            --package general-runtime \
            --package thxnet-leafchain"
