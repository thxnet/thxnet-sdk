name: Docker

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  ROOTCHAIN_IMAGE: ${{ github.repository_owner }}/rootchain
  LEAFCHAIN_IMAGE: ${{ github.repository_owner }}/leafchain

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rootchain:
    name: Build rootchain image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ROOTCHAIN_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: scripts/ci/dockerfiles/polkadot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  leafchain:
    name: Build leafchain image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.LEAFCHAIN_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: scripts/ci/dockerfiles/leafchain/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
