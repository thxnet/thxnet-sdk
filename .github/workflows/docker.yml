name: Docker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for Docker images (e.g. 1.3.0)"
        required: true

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rootchain:
    name: Build rootchain image
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push rootchain
        uses: docker/bake-action@v4
        with:
          files: thxnet/docker/polkadot/docker-bake.hcl
          targets: rootchain
          push: true
        env:
          TAG: ${{ steps.tag.outputs.tag }}

  leafchain:
    name: Build leafchain image
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push leafchain
        uses: docker/bake-action@v4
        with:
          files: thxnet/docker/leafchain/docker-bake.hcl
          targets: leafchain
          push: true
        env:
          TAG: ${{ steps.tag.outputs.tag }}
