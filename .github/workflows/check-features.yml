# Per-runtime feature alignment check using cargo-featalign.
# Complements the workspace-wide zepter propagation lint in fmt-check.yml:
# zepter catches missing feature forwarding across workspace crates;
# featalign verifies that a specific runtime crate's full dependency tree
# has consistent std/try-runtime/runtime-benchmarks activation.
#
# cf. polkadot-sdk .github/workflows/check-features.yml

name: Check Features

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-features:
    name: Feature alignment — ${{ matrix.runtime }}
    # runs-on: ubuntu-latest required because hack-ink/cargo-featalign v0.6.2
    # ships a prebuilt binary linked against glibc >= 2.34. The ARC runner
    # container (paritytech/ci-unified:bullseye-…) is Debian 11 with glibc 2.31,
    # so the binary fails to load on ARC. No bookworm variant of ci-unified
    # exists yet. Revisit once a glibc >= 2.34 ARC container is available.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: thxnet-runtime
            crate: thxnet/runtime/thxnet
          - runtime: thxnet-testnet-runtime
            crate: thxnet/runtime/thxnet-testnet
          - runtime: general-runtime
            crate: thxnet/leafchain/runtime/general
    steps:
      - uses: actions/checkout@v5

      - name: Check feature alignment
        uses: hack-ink/cargo-featalign-action@bea88a864d6ca7d0c53c26f1391ce1d431dc7f34 # v0.1.1
        with:
          crate: ${{ matrix.crate }}
          features: std,runtime-benchmarks,try-runtime
          # sc-executor: not a dependency we control
          # wasmtime: sp-wasm-interface doesn't propagate std to wasmtime (upstream issue).
          # Safe to ignore — wasmtime is host-only, not WASM runtime.
          # sp-wasm-interface: featalign's --ignore stops recursion INTO a crate but
          # still reports the missing feature on the parent. We must ignore the parent
          # (sp-wasm-interface) so the wasmtime missing-std issue is never raised.
          ignore: sc-executor,wasmtime,sp-wasm-interface
          default-std: true
