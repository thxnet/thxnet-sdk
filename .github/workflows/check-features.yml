# Per-runtime feature alignment check using cargo-featalign.
# Complements the workspace-wide zepter propagation lint in fmt-check.yml:
# zepter catches missing feature forwarding across workspace crates;
# featalign verifies that a specific runtime crate's full dependency tree
# has consistent std/try-runtime/runtime-benchmarks activation.
#
# cf. polkadot-sdk .github/workflows/check-features.yml

name: Check Features

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-features:
    name: Feature alignment — ${{ matrix.runtime }}
    runs-on: hetzner-thxnet-light
    timeout-minutes: 15
    container:
      image: docker.io/paritytech/ci-unified:bullseye-1.88.0-2025-06-27-v202511141243
      volumes:
        - /home/runner/.cache/cargo-registry:/usr/local/cargo/registry
        - /home/runner/.cache/cargo-git:/usr/local/cargo/git
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: thxnet-runtime
            crate: thxnet/runtime/thxnet
          - runtime: thxnet-testnet-runtime
            crate: thxnet/runtime/thxnet-testnet
          - runtime: general-runtime
            crate: thxnet/leafchain/runtime/general
    steps:
      - uses: actions/checkout@v5

      - name: Prepare ARC environment for cargo-featalign
        run: |
          if ! command -v zstd >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends zstd
            else
              apt-get update -qq && apt-get install -y --no-install-recommends zstd
            fi
          fi
          mkdir -p "$HOME/.cargo/bin"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Check feature alignment
        uses: hack-ink/cargo-featalign-action@bea88a864d6ca7d0c53c26f1391ce1d431dc7f34 # v0.1.1
        with:
          crate: ${{ matrix.crate }}
          features: std,runtime-benchmarks,try-runtime
          ignore: sc-executor
          default-std: true
